openapi: 3.0.3
info:
  title: ShopHub API
  version: 0.2.0
  description: |
    현재 코드 기준 API 명세서.
    패키지 구조(domain/global/infrastructure)에 맞춰 구현된 REST API를 기술한다.
servers:
  - url: http://localhost:8080
    description: local

tags:
  - name: Auth
  - name: Dashboard
  - name: Content
  - name: Store Profile
  - name: Reviews
  - name: Review Inbox

paths:
  /v1/auth/signup:
    post:
      tags: [Auth]
      summary: 회원가입
      operationId: signUp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/auth/login:
    post:
      tags: [Auth]
      summary: 로그인
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/stores:
    get:
      tags: [Store Profile]
      summary: 가게 목록 조회
      operationId: getStores
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StoreProfile'
    post:
      tags: [Store Profile]
      summary: 가게 생성
      description: |
        프론트 온보딩 호환 필드를 함께 지원한다.
        - 소개: `introduction` 또는 `description`
        - 주소: `address` 또는 `neighborhood`
        - 말투: `toneOfVoice` 또는 `tone`
        - 메뉴: `menuItems` 또는 `menu`
        - 영업시간: `businessHours` 또는 `hours`(예: `매일 11:00 - 21:00`)
      operationId: createStore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStoreRequest'
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreProfile'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/stores/{storeId}/dashboard:
    get:
      tags: [Dashboard]
      summary: 대시보드 조회
      operationId: getDashboardOverview
      parameters:
        - $ref: '#/components/parameters/StoreId'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardOverview'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/stores/{storeId}/contents:
    get:
      tags: [Content]
      summary: 콘텐츠 목록 조회
      operationId: getContents
      parameters:
        - $ref: '#/components/parameters/StoreId'
        - in: query
          name: status
          required: false
          schema:
            $ref: '#/components/schemas/ContentStatus'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContentItem'
    post:
      tags: [Content]
      summary: 콘텐츠 생성 또는 AI 양식 추천
      operationId: createContent
      parameters:
        - $ref: '#/components/parameters/StoreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContentRequest'
      responses:
        '200':
          description: AI 양식 추천 성공 (aiSuggest=true)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentSuggestion'
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentItem'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/stores/{storeId}/contents/{contentId}/retry:
    post:
      tags: [Content]
      summary: 실패/기존 콘텐츠 다시 작성
      description: 경로의 `storeId`와 콘텐츠 소유 매장이 다르면 404를 반환한다.
      operationId: retryContent
      parameters:
        - $ref: '#/components/parameters/StoreId'
        - $ref: '#/components/parameters/ContentId'
      responses:
        '200':
          description: 재작성 요청 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentItem'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/stores/{storeId}/contents/{contentId}/status:
    patch:
      tags: [Content]
      summary: 콘텐츠 상태 변경
      description: 경로의 `storeId`와 콘텐츠 소유 매장이 다르면 404를 반환한다.
      operationId: changeContentStatus
      parameters:
        - $ref: '#/components/parameters/StoreId'
        - $ref: '#/components/parameters/ContentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeContentStatusRequest'
      responses:
        '200':
          description: 변경 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentItem'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/stores/{storeId}/contents/instagram/publish-carousel:
    post:
      tags: [Content]
      summary: 인스타그램 이미지 게시 (1장 이상)
      description: |
        로컬 업로드 이미지를 저장 후 공개 URL로 변환하고,
        가게/콘텐츠/운영시간 정보를 바탕으로 AI 캡션을 생성한 뒤 Instagram Graph API로 게시한다.
        - 1장이면 단일 이미지 게시
        - 2장 이상이면 캐러셀 게시
      operationId: publishInstagramCarousel
      parameters:
        - $ref: '#/components/parameters/StoreId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [images]
              properties:
                images:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: 게시 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstagramPublishResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '502':
          $ref: '#/components/responses/BadGateway'

  /v1/stores/{storeId}/profile:
    get:
      tags: [Store Profile]
      summary: 가게 프로필 조회
      operationId: getStoreProfile
      parameters:
        - $ref: '#/components/parameters/StoreId'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreProfile'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/stores/{storeId}/profile/basic:
    put:
      tags: [Store Profile]
      summary: 가게 기본 정보 수정
      operationId: updateStoreBasicProfile
      parameters:
        - $ref: '#/components/parameters/StoreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBasicRequest'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreProfile'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/stores/{storeId}/profile/hours:
    put:
      tags: [Store Profile]
      summary: 영업시간 수정
      operationId: updateStoreHours
      parameters:
        - $ref: '#/components/parameters/StoreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHoursRequest'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreProfile'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/stores/{storeId}/profile/menus:
    post:
      tags: [Store Profile]
      summary: 메뉴 추가
      operationId: addStoreMenu
      parameters:
        - $ref: '#/components/parameters/StoreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMenuRequest'
      responses:
        '200':
          description: 추가 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreProfile'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/stores/{storeId}/profile/menus/{menuId}:
    delete:
      tags: [Store Profile]
      summary: 메뉴 삭제
      operationId: removeStoreMenu
      parameters:
        - $ref: '#/components/parameters/StoreId'
        - $ref: '#/components/parameters/MenuId'
      responses:
        '200':
          description: 삭제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreProfile'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/stores/{storeId}/reviews/summary:
    get:
      tags: [Reviews]
      summary: 리뷰 요약 조회
      operationId: getStoreReviewSummary
      parameters:
        - $ref: '#/components/parameters/StoreId'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreReviewSummary'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/stores/{storeId}/reviews:
    get:
      tags: [Reviews]
      summary: 리뷰 목록 조회
      operationId: getStoreReviews
      parameters:
        - $ref: '#/components/parameters/StoreId'
        - in: query
          name: keyword
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StoreReview'

  /v1/stores/{storeId}/reviews/sync-google:
    post:
      tags: [Reviews]
      summary: Google 리뷰 동기화
      operationId: syncGoogleReviews
      parameters:
        - $ref: '#/components/parameters/StoreId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncGoogleReviewsRequest'
      responses:
        '202':
          description: 동기화 시작/완료
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StoreReview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'

  /v1/reviews/{reviewId}/ai-draft:
    post:
      tags: [Reviews]
      summary: 리뷰 답글 AI 초안 생성
      operationId: createReviewAiDraft
      parameters:
        - $ref: '#/components/parameters/ReviewId'
      responses:
        '200':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiDraftResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/reviews/{reviewId}/ai-auto-reply:
    post:
      tags: [Reviews]
      summary: 리뷰 AI 답글 자동 생성 후 저장
      operationId: autoReplyReviewWithAi
      parameters:
        - $ref: '#/components/parameters/ReviewId'
      responses:
        '200':
          description: 생성 및 저장 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreReview'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/reviews/{reviewId}/reply:
    post:
      tags: [Reviews]
      summary: 리뷰 답글 등록
      operationId: replyReview
      parameters:
        - $ref: '#/components/parameters/ReviewId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplyRequest'
      responses:
        '200':
          description: 등록 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreReview'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/reviews/inbox:
    get:
      tags: [Review Inbox]
      summary: Place ID 기반 통합 리뷰 Inbox 조회
      operationId: getReviewInbox
      parameters:
        - in: query
          name: placeIds
          required: true
          description: Google Place ID 목록 (복수 전달 가능)
          schema:
            type: array
            items:
              type: string
            minItems: 1
          style: form
          explode: true
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewInbox'
        '400':
          $ref: '#/components/responses/BadRequest'
        '502':
          $ref: '#/components/responses/BadGateway'

components:
  parameters:
    StoreId:
      in: path
      name: storeId
      required: true
      schema:
        type: string
        format: uuid
    ContentId:
      in: path
      name: contentId
      required: true
      schema:
        type: string
        format: uuid
    MenuId:
      in: path
      name: menuId
      required: true
      schema:
        type: string
        format: uuid
    ReviewId:
      in: path
      name: reviewId
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    BadGateway:
      description: 외부 API 연동 오류 (Google Places)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

  schemas:
    SignUpRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [accessToken, expiresAt, user]
      properties:
        accessToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserProfile'

    UserProfile:
      type: object
      required: [id, email, name]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string

    DashboardOverview:
      type: object
      required:
        [storeId, storeName, draftContent, suggestionCard, reviewWidget, checklistItems, recentReviews, generatedAt]
      properties:
        storeId:
          type: string
          format: uuid
        storeName:
          type: string
        draftContent:
          $ref: '#/components/schemas/DashboardDraftContent'
        suggestionCard:
          $ref: '#/components/schemas/DashboardSuggestionCard'
        reviewWidget:
          $ref: '#/components/schemas/DashboardReviewWidget'
        checklistItems:
          type: array
          items:
            $ref: '#/components/schemas/DashboardChecklistItem'
        recentReviews:
          type: array
          items:
            $ref: '#/components/schemas/DashboardRecentReviewItem'
        generatedAt:
          type: string
          format: date-time

    DashboardDraftContent:
      type: object
      required: [title, body, charCount, maxCharCount, channels]
      properties:
        title:
          type: string
        body:
          type: string
        charCount:
          type: integer
        maxCharCount:
          type: integer
        channels:
          type: array
          items:
            type: string

    DashboardSuggestionCard:
      type: object
      required: [title, message, actionLabel]
      properties:
        title:
          type: string
        message:
          type: string
        actionLabel:
          type: string

    DashboardReviewWidget:
      type: object
      required: [totalReviews, syncedRecentReviews, reviewListUrl]
      properties:
        totalReviews:
          type: integer
        syncedRecentReviews:
          type: integer
        reviewListUrl:
          type: string

    DashboardChecklistItem:
      type: object
      required: [key, title, completed]
      properties:
        key:
          type: string
        title:
          type: string
        completed:
          type: boolean

    DashboardRecentReviewItem:
      type: object
      required: [reviewId, authorName, rating, content, ageLabel]
      properties:
        reviewId:
          type: string
          format: uuid
        authorName:
          type: string
        rating:
          type: integer
        content:
          type: string
        ageLabel:
          type: string

    ContentStatus:
      type: string
      enum: [DRAFT, SCHEDULED, PUBLISHED, FAILED]

    ContentItem:
      type: object
      required: [id, storeId, title, body, channels, status, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        storeId:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        channels:
          type: array
          items:
            type: string
        status:
          $ref: '#/components/schemas/ContentStatus'
        updatedAt:
          type: string
          format: date-time

    InstagramPublishResult:
      type: object
      required: [mediaId, caption, imageUrls, publishedAt]
      properties:
        mediaId:
          type: string
        caption:
          type: string
        imageUrls:
          type: array
          items:
            type: string
        publishedAt:
          type: string
          format: date-time

    CreateContentRequest:
      type: object
      description: |
        - aiSuggest=true 이면 eventText를 바탕으로 title/body 추천 결과를 반환한다.
        - aiSuggest 미지정 또는 false 이면 title/body로 실제 콘텐츠를 생성한다.
      properties:
        title:
          type: string
        body:
          type: string
        channels:
          type: array
          items:
            type: string
        aiSuggest:
          type: boolean
          default: false
        eventText:
          type: string

    ContentSuggestion:
      type: object
      required: [title, body]
      properties:
        title:
          type: string
        body:
          type: string

    ChangeContentStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/ContentStatus'

    CreateStoreRequest:
      type: object
      required: [name, category]
      allOf:
        - anyOf:
            - required: [address]
            - required: [neighborhood]
        - anyOf:
            - required: [toneOfVoice]
            - required: [tone]
      properties:
        name:
          type: string
          description: 가게명 (필수)
        phone:
          type: string
        introduction:
          type: string
          description: 소개글. 없으면 description으로 대체
        description:
          type: string
          description: introduction의 프론트 호환 필드
        address:
          type: string
          description: 주소. 없으면 neighborhood로 대체
        neighborhood:
          type: string
          description: address가 없을 때 대체값으로 사용
        category:
          type: string
          description: 업종 (필수)
        toneOfVoice:
          type: string
          description: tone이 없을 때 우선 사용
        tone:
          type: string
          description: toneOfVoice의 프론트 호환 필드
        hours:
          type: string
          description: businessHours가 없을 때 파싱하는 요약 문자열 (예: 매일 10:00 - 20:00)
        businessHours:
          type: array
          items:
            $ref: '#/components/schemas/BusinessHour'
        menu:
          type: array
          description: menuItems가 없을 때 사용하는 메뉴 이름 배열(문자열)
          items:
            type: string
        menuItems:
          type: array
          items:
            $ref: '#/components/schemas/CreateStoreMenuItemRequest'
        googlePlaceId:
          type: string
        googleReviewUrl:
          type: string

    CreateStoreMenuItemRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    StoreProfile:
      type: object
      required:
        [id, name, phone, introduction, address, category, toneOfVoice, businessHours, menuItems, googleTotalReviews, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        introduction:
          type: string
        address:
          type: string
        category:
          type: string
        toneOfVoice:
          type: string
        businessHours:
          type: array
          items:
            $ref: '#/components/schemas/BusinessHour'
        menuItems:
          type: array
          items:
            $ref: '#/components/schemas/MenuItem'
        googlePlaceId:
          type: string
          nullable: true
        googleReviewUrl:
          type: string
          nullable: true
        googleTotalReviews:
          type: integer
        updatedAt:
          type: string
          format: date-time

    BusinessHour:
      type: object
      required: [dayOfWeek, openTime, closeTime, open]
      properties:
        dayOfWeek:
          type: string
          example: MON
        openTime:
          type: string
          example: '10:00'
        closeTime:
          type: string
          example: '21:00'
        open:
          type: boolean

    MenuItem:
      type: object
      required: [id, name, description]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string

    UpdateBasicRequest:
      type: object
      required: [name, phone, introduction, address, category, toneOfVoice]
      properties:
        name:
          type: string
        phone:
          type: string
        introduction:
          type: string
        address:
          type: string
        category:
